<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="robots" content="noindex, nofollow">
  <meta name="title" content="BMI TELECOM">

  <title>BMI TELECOM</title>
  <link rel="stylesheet" href="/fontawesome-free-6.7.2-web/css/all.css">
  <link rel="stylesheet" href="https://qr.io/css/leaf.css">

  <script src="https://qr.io/vue-scripts/vue@2.6.14.js"></script>
  <script src="https://qr.io/vue-scripts/axios.min.js"></script>
</head>

<body style="background: #1477c2;">

  <div class="container d-flex align-items-center justify-content-center min-dvh-100 py-5">
    <div class="card shadow-soft border-light w-100" style="max-width: 400px;">

      <!-- LOGO -->
      <div class="mt-n5" style="width: 10rem; min-height: 10rem; margin: 0 auto;">
        <img src="https://application-logos.s3.amazonaws.com/9k1DUP.png"
             class="card-img-top"
             alt="Logo BMI"
             style="border-radius: 15%;">
      </div>

      <div class="card-body text-center">
        <h2 class="card-title mb-2">BMI TELECOM</h2>

        <!-- SITE -->
        <div class="mb-2">
          <a href="https://bmitelecom.com.br/"
             class="card-subtitle text-dark"
             style="color:#1477c2;">
            https://bmitelecom.com.br/
          </a>
        </div>

        <!-- DESCRIÇÃO -->
        <p class="mb-3">
          Somos um provedor regional de internet e atuamos em Ibirité, Contagem e Belo Horizonte.
        </p>
       <p class="mb-3">
         Baixe nosso aplicativo com os botões abaixo:
        </p>
        <!-- GOOGLE PLAY -->
        <div class="card-footer p-2">
          <a href="https://play.google.com/store/apps/details?id=br.com.bmitelecom.centralbmi&hl=pt_BR">
            <img style="width:160px;"
                src="https://res.cloudinary.com/dzqehhrev/image/upload/f_auto,q_auto/play_lcxmqs"
                alt="Google Play">
          </a>
        </div>

        <!-- APPLE STORE -->
        <div class="card-footer p-2">
          <a href="https://apps.apple.com/br/app/bmi-telecom/id1548495932">
            <img style="width:160px;"
src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg"
alt="App Store">
          </a>
        </div>

      </div>
    </div>
  </div>

  <!-- ANALYTICS (opcional) -->
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js"></script>

</body>
</html>
