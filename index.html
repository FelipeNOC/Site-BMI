<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecionando...</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.container {
  text-align: center;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 20px;
}

.card {
  background: #1a1a1a;
  padding: 30px;
  border-radius: 15px;
  width: 300px;
}

button {
  background: #22c55e;
  border: none;
  padding: 12px 20px;
  color: white;
  font-size: 16px;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

.small {
  font-size: 12px;
  color: #aaa;
  margin-top: 15px;
}
</style>

<script>
// 🔥 CONFIGURAÇÃO (troca aqui)
const destino = "https://seusite.com";

// redirecionamento automático
setTimeout(() => {
  window.location.href = destino;
}, 2000);
</script>

</head>

<body>
<div class="container">

  <div class="logo">QR Page</div>

  <div class="card">
    <p>Você está sendo redirecionado...</p>

    <button onclick="window.location.href=destino">
      Continuar
    </button>

    <div class="small">
      Caso não funcione, clique no botão acima
    </div>
  </div>

</div>
</body>
</html>
